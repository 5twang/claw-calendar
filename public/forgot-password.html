<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>忘记密码 - Claw-Calendar</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-box">
      <div class="card">
        <div class="card-header" style="text-align: center;">
          <div style="margin-bottom: 16px;">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#dc3545" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
          </div>
          <h1 class="card-title">忘记密码</h1>
          <p class="card-subtitle">输入您的邮箱地址，我们将发送验证码</p>
        </div>
        
        <div class="card-body">
          <div id="message" class="alert hidden"></div>
          
          <form id="forgot-form">
            <div class="form-group">
              <label class="form-label" for="email">邮箱地址</label>
              <input 
                type="email" 
                id="email" 
                class="form-input" 
                placeholder="your@email.com"
                required
                autocomplete="email"
              >
            </div>
            
            <button type="submit" id="submit-btn" class="btn btn-primary btn-block" style="margin-top: 8px;">
              发送验证码
            </button>
          </form>
        </div>
      </div>
      
        <div class="auth-footer">
          记得密码了？<a href="/login.html">返回登录</a>
          <span style="margin: 0 8px; color: #999;">|</span>
          <a href="/register.html">注册账户</a>
        </div>
    </div>
  </div>

  <script src="/js/auth-forms.js"></script>
</body>
</html>
