<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claw Calendar Admin</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <!-- Toast 通知容器 -->
  <div id="toast-container"></div>

  <!-- 登录区域 -->
  <div id="login-section" class="auth-page">
    <div class="auth-box">
      <div class="card">
        <div class="card-header" style="text-align: center;">
          <div class="auth-logo">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
              <path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01M16 18h.01"></path>
            </svg>
          </div>
          <h1 class="card-title">管理面板</h1>
          <p class="card-subtitle">Claw Calendar 管理员登录</p>
        </div>

        <div class="card-body">
          <div id="login-error" class="alert alert-error hidden">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
            </svg>
            <span></span>
          </div>

          <form id="login-form">
            <div class="form-group">
              <label class="form-label" for="login-email">管理员邮箱</label>
              <input type="email" id="login-email" class="form-input" placeholder="admin@example.com" required autocomplete="email">
            </div>

            <div class="form-group">
              <label class="form-label" for="login-password">密码</label>
              <input type="password" id="login-password" class="form-input" placeholder="请输入密码" required autocomplete="current-password">
            </div>

            <button type="submit" id="login-btn" class="btn btn-primary btn-block">
              登录
            </button>
          </form>
        </div>
      </div>

      <div class="auth-footer">
        <a href="/">返回 Claw Calendar 首页</a>
      </div>
    </div>
  </div>

  <!-- 仪表盘区域（默认隐藏） -->
  <div id="dashboard-section" style="display:none">
    <!-- 顶部导航 -->
    <header class="admin-header">
      <div class="header-inner">
        <div class="header-left">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
          <span class="header-title">Claw Calendar Admin</span>
        </div>
        <div class="header-right">
          <span class="header-admin-info" id="header-admin-info"></span>
          <button id="logout-btn" class="btn btn-sm btn-outline" title="登出">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            登出
          </button>
        </div>
      </div>
    </header>

    <main class="admin-main">
      <div class="admin-container">
        <!-- 统计摘要 -->
        <section id="stats" class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon stat-icon-total">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M23 21v-2a4 4 0 00-3-3.87"></path>
                <path d="M16 3.13a4 4 0 010 7.75"></path>
              </svg>
            </div>
            <div class="stat-body">
              <span class="stat-value" id="stat-total">-</span>
              <span class="stat-label">总用户数</span>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon stat-icon-active">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 11-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
              </svg>
            </div>
            <div class="stat-body">
              <span class="stat-value" id="stat-active">-</span>
              <span class="stat-label">活跃用户</span>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon stat-icon-admin">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
              </svg>
            </div>
            <div class="stat-body">
              <span class="stat-value" id="stat-admins">-</span>
              <span class="stat-label">管理员</span>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon stat-icon-inactive">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="15" y1="9" x2="9" y2="15"></line>
                <line x1="9" y1="9" x2="15" y2="15"></line>
              </svg>
            </div>
            <div class="stat-body">
              <span class="stat-value" id="stat-inactive">-</span>
              <span class="stat-label">未激活</span>
            </div>
          </div>
        </section>

        <!-- 搜索/筛选栏 -->
        <section id="filters" class="filters-bar">
          <div class="filter-group filter-search">
            <input type="text" id="search-input" class="form-input" placeholder="搜索邮箱或用户名..." autocomplete="off">
          </div>
          <div class="filter-group">
            <select id="status-filter" class="form-select">
              <option value="all">全部状态</option>
              <option value="active">活跃</option>
              <option value="inactive">未激活</option>
            </select>
          </div>
          <div class="filter-group filter-checkbox">
            <label class="form-checkbox">
              <input type="checkbox" id="admin-filter">
              仅管理员
            </label>
          </div>
          <button id="search-btn" class="btn btn-primary btn-sm">搜索</button>
        </section>

        <!-- 用户表格 -->
        <section id="user-table-section" class="table-section">
          <div class="table-header">
            <h2 class="table-title">用户列表</h2>
            <span class="table-count" id="table-count"></span>
          </div>
          <div class="table-wrapper">
            <table class="data-table" id="user-table">
              <thead>
                <tr>
                  <th>邮箱</th>
                  <th>姓名</th>
                  <th>状态</th>
                  <th>角色</th>
                  <th>日历</th>
                  <th>事件</th>
                  <th>注册时间</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="user-tbody">
                <!-- 由 JS 动态渲染 -->
              </tbody>
            </table>
          </div>
          <div id="table-loading" class="table-loading hidden">
            <div class="spinner"></div>
            <span>加载中...</span>
          </div>
          <div id="table-empty" class="table-empty hidden">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"></path>
              <polyline points="13 2 13 9 20 9"></polyline>
            </svg>
            <p>暂无用户数据</p>
          </div>
        </section>

        <!-- 分页 -->
        <section id="pagination" class="pagination-bar hidden">
          <div class="pagination-info" id="pagination-info"></div>
          <div class="pagination-controls">
            <button id="prev-page-btn" class="btn btn-sm btn-outline" disabled>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
              </svg>
              上一页
            </button>
            <span class="pagination-current" id="pagination-current">第 1 页</span>
            <button id="next-page-btn" class="btn btn-sm btn-outline">
              下一页
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </button>
          </div>
        </section>
      </div>
    </main>
  </div>

  <!-- 用户详情弹窗 -->
  <div id="user-detail-modal" class="modal-overlay" style="display:none">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">用户详情</h3>
        <button id="modal-close-btn" class="modal-close-btn" aria-label="关闭">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body" id="modal-body">
        <!-- 由 JS 动态填充 -->
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
