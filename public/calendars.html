<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日历管理 - Claw-Calendar</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <script src="/js/navbar.js"></script>
    <div class="container">
      <a href="/dashboard.html" class="navbar-brand">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        <span>Claw-Calendar</span>
      </a>
      <button class="navbar-toggle" onclick="toggleNavbar()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      <div class="navbar-nav" id="navbar-nav">
        <a href="/dashboard.html" class="nav-link">控制台</a>
        <a href="/calendar.html" class="nav-link">日历</a>
        <a href="/apikeys.html" class="nav-link">API Keys</a>
        <a href="/profile.html" class="nav-link">设置</a>
        <button onclick="logout()" class="btn btn-sm btn-outline">退出</button>
      </div>
    </div>

  <!-- 主内容 -->
  <main class="main-content">
    <div class="container">
      <div class="card">
    <!-- 面包屑导航 -->
    <div class="breadcrumb">
      <a href="/dashboard.html" class="breadcrumb-item">控制台</a>
      <span class="breadcrumb-separator">/</span>
      <span class="breadcrumb-item active">日历管理</span>
    </div>
    
    <div class="card-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;">
      <div>
        <h1 class="card-title">我的日历</h1>
        <p class="card-subtitle">管理你的日历和订阅</p>
      </div>
          <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
            <div class="search-container">
              <input type="text" id="calendarSearch" placeholder="搜索日历名称..." class="search-input">
              <span class="search-icon">🔍</span>
            </div>
            <div class="view-switcher">
              <button class="btn btn-sm btn-outline view-btn active" data-view="list" onclick="switchView('list')" title="列表视图">
                <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M3 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/>
                </svg>
              </button>
              <button class="btn btn-sm btn-outline view-btn" data-view="grid" onclick="switchView('grid')" title="网格视图">
                <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M5 3a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2V5a2 2 0 00-2-2H5zM5 11a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2v-2a2 2 0 00-2-2H5zM11 5a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V5zM11 13a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" clip-rule="evenodd"/>
                </svg>
              </button>
            </div>
            <div id="batchActions" class="batch-actions hidden">
              <span id="selectedCount" class="selected-count">已选择 0 个日历</span>
              <button class="btn btn-sm btn-danger" onclick="deleteSelectedCalendars()">
                <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"/>
                </svg>
                删除选中
              </button>
              <button class="btn btn-sm btn-secondary" onclick="clearSelection()">
                取消选择
              </button>
            </div>
            <button class="btn btn-primary" onclick="showCreateCalendarModal()">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/>
              </svg>
              创建日历
            </button>
          </div>
        </div>
        
        <div class="card-body">
          <div id="calendar-message" class="alert hidden"></div>
          <div id="calendar-list" class="calendar-list">
            <div class="loading">加载中...</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- 创建日历模态框 -->
  <div class="modal" id="create-calendar-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">创建新日历</h3>
        <button class="modal-close" onclick="closeCreateCalendarModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label" for="calendar-name">日历名称 *</label>
          <input type="text" id="calendar-name" class="form-input" placeholder="例如：工作日历、个人日程">
        </div>
        <div class="form-group">
          <label class="form-label" for="calendar-description">描述</label>
          <textarea id="calendar-description" class="form-input" rows="3" placeholder="可选：添加日历描述"></textarea>
        </div>
        <div class="form-group">
          <label class="form-checkbox">
            <input type="checkbox" id="calendar-public">
            <span>公开日历（可通过链接订阅）</span>
          </label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeCreateCalendarModal()">取消</button>
        <button class="btn btn-primary" onclick="createCalendar()">创建</button>
      </div>
    </div>
  </div>

  <!-- 订阅链接模态框 -->
  <div class="modal" id="subscribe-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">日历订阅</h3>
        <button class="modal-close" onclick="closeSubscribeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <p class="text-secondary" style="margin-bottom: 16px;">使用以下 URL 在其他日历应用中订阅此日历：</p>
        <div class="form-group">
          <div class="input-group">
            <input type="text" id="subscribe-url" class="form-input" readonly>
            <button class="btn btn-secondary" onclick="copySubscribeUrl()">复制</button>
          </div>
        </div>
        <div class="help-text" style="margin-top: 16px;">
          <p><strong>支持的日历应用：</strong></p>
          <ul style="margin-left: 20px; color: var(--gray-600);">
            <li>Apple 日历 (iPhone/Mac)</li>
            <li>Google 日历</li>
            <li>Outlook</li>
            <li>其他支持 iCal 格式的应用</li>
          </ul>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeSubscribeModal()">关闭</button>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/calendars.js"></script>
</body>
</html>
