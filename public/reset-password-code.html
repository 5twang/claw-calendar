<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>重置密码 - Claw-Calendar</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-box">
      <div class="card">
        <div class="card-header" style="text-align: center;">
          <div style="margin-bottom: 16px;">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
          </div>
          <h1 class="card-title">重置密码</h1>
          <p class="card-subtitle">请输入验证码和您的新密码</p>
        </div>

        <div class="card-body">
          <div id="message" class="alert hidden"></div>

          <form id="resetForm">
            <div class="form-group">
              <label class="form-label" for="email">邮箱</label>
              <input type="email" id="email" class="form-input" placeholder="your@email.com" required readonly>
            </div>

            <div class="form-group">
              <label class="form-label" for="code">验证码</label>
              <input type="text" id="code" class="form-input" placeholder="请输入 6 位验证码"
                     pattern="[0-9]{6}" maxlength="6" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="newPassword">新密码</label>
              <input type="password" id="newPassword" class="form-input"
                     placeholder="至少 8 位字符" minlength="8" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="confirmPassword">确认密码</label>
              <input type="password" id="confirmPassword" class="form-input"
                     placeholder="再次输入密码" minlength="8" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block" id="submitBtn" style="margin-top: 8px;">
              重置密码
            </button>
          </form>
        </div>
      </div>

      <div class="auth-footer">
        <a href="login.html">返回登录</a>
        <span style="margin: 0 8px;">|</span>
        <a href="forgot-password.html">重新发送验证码</a>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="/js/auth-forms.js"></script>
</body>
</html>
