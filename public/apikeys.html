<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Keys - Claw-Calendar</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <script src="/js/navbar.js"></script>

  <!-- 主内容 -->
  <main class="main-content">
    <div class="container">
      <div class="card">
        <div id="apikey-message" class="alert hidden"></div>
        <div class="card-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;">
          <div>
            <h1 class="card-title">API Keys</h1>
            <p class="card-subtitle">管理你的 API 访问密钥</p>
          </div>
          <button class="btn btn-primary" onclick="showCreateApiKeyModal()">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/>
            </svg>
            创建 API Key
          </button>
        </div>
        
        <div class="card-body">
          <div id="apikey-list">
            <!-- API Key 列表将在这里渲染 -->
            <div style="text-align:center;padding:40px;">
              <span class="spinner"></span> 加载中...
            </div>
          </div>
        </div>
      </div>
      
      <!-- 使用说明 -->
      <div class="card" style="margin-top: 24px;">
        <div class="card-header">
          <h3 class="card-title">使用说明</h3>
        </div>
        <div class="card-body">
          <div style="display: grid; gap: 16px; color: var(--gray-600);">
            <p>• API Key 用于程序化的 API 访问，每个密钥都可以访问你账户下的所有资源</p>
            <p>• 出于安全考虑，API Key 只在创建时显示一次，请妥善保存</p>
            <p>• 如果密钥泄露，请立即删除并创建新的密钥</p>
            <p>• 在 HTTP 请求头中添加 <code style="background: var(--gray-100); padding: 2px 6px; border-radius: 4px; font-family: monospace;">X-API-Key: your-key</code> 进行认证</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- 创建 API Key 模态框 -->
  <div class="modal-overlay" id="create-apikey-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">创建 API Key</h3>
        <button class="modal-close" onclick="closeCreateApiKeyModal()">&times;</button>
      </div>
      <div class="modal-body">
        <form id="create-apikey-form">
          <div class="form-group">
            <label class="form-label" for="new-key-name">名称（可选）</label>
            <input type="text" id="new-key-name" class="form-input" placeholder="例如：生产环境、测试环境">
            <p class="form-hint">给密钥起个名字以便识别用途</p>
          </div>
          
          <div class="form-group">
            <label class="form-label" for="new-key-expiry">过期时间（可选）</label>
            <select id="new-key-expiry" class="form-input">
              <option value="">永不过期</option>
              <option value="30">30 天后过期</option>
              <option value="90">90 天后过期</option>
              <option value="180">180 天后过期</option>
              <option value="365">1 年后过期</option>
            </select>
          </div>
          
          <div id="new-key-result" class="hidden"></div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeCreateApiKeyModal()">关闭</button>
        <button class="btn btn-primary" id="create-key-btn" onclick="submitCreateApiKey()">创建</button>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/apikeys.js"></script>
  <script src="/js/pages.js"></script>
</body>
</html>
