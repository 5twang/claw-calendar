<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置 - Claw-Calendar</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="container">
      <a href="/dashboard.html" class="navbar-brand">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        <span>Claw-Calendar</span>
      </a>
      <button class="navbar-toggle" onclick="toggleNavbar()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      <div class="navbar-nav" id="navbar-nav">
        <a href="/dashboard.html" class="nav-link">控制台</a>
        <a href="/calendar.html" class="nav-link">日历</a>
        <a href="/apikeys.html" class="nav-link">API Keys</a>
        <a href="/profile.html" class="nav-link">设置</a>
        <button onclick="logout()" class="btn btn-sm btn-outline">退出</button>
      </div>
    </div>
  </nav>

  <!-- 主内容 -->
  <main class="main-content">
    <div class="container">
      <div class="card">
        <div class="card-header">
          <h1 class="card-title">个人设置</h1>
          <p class="card-subtitle">管理你的账户信息</p>
        </div>
        
        <div class="card-body">
          <!-- 基本信息 -->
          <div style="margin-bottom: 32px;">
            <h3 style="font-size: 1.1rem; margin-bottom: 20px; color: var(--gray-900); display: flex; align-items: center; gap: 8px;">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor" style="color: var(--primary);">
                <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
              </svg>
              基本信息
            </h3>
            
            <div style="display: grid; gap: 16px; max-width: 400px;">
              <div>
                <label class="form-label">邮箱地址</label>
                <input type="email" id="profile-email" class="form-input" disabled style="background: var(--gray-100); color: var(--gray-500);">
                <p class="form-hint">邮箱地址不可修改</p>
              </div>
              
              <div>
                <label class="form-label">姓名</label>
                <input type="text" id="profile-name" class="form-input" placeholder="请输入姓名">
              </div>
              
              <div>
                <button type="button" id="save-name-btn" class="btn btn-primary" onclick="saveProfileName()">
                  保存姓名
                </button>
              </div>
              
              <div>
                <label class="form-label">注册时间</label>
                <input type="text" id="profile-created" class="form-input" disabled style="background: var(--gray-100); color: var(--gray-500);">
              </div>
            </div>
          </div>
          
          <hr style="border: none; border-top: 1px solid var(--gray-200); margin: 32px 0;">
          
          <!-- 修改密码 -->
          <div>
            <h3 style="font-size: 1.1rem; margin-bottom: 20px; color: var(--gray-900); display: flex; align-items: center; gap: 8px;">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor" style="color: var(--primary);">
                <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
              </svg>
              修改密码
            </h3>
            
            <form id="change-password-form" style="max-width: 400px;">
              <div class="form-group">
                <label class="form-label" for="current-password">当前密码 *</label>
                <input type="password" id="current-password" class="form-input" required placeholder="请输入当前密码">
              </div>
              
              <div class="form-group">
                <label class="form-label" for="new-password">新密码 *</label>
                <input type="password" id="new-password" class="form-input" required minlength="8" placeholder="至少8位字符">
                <p class="form-hint">密码长度至少8位</p>
              </div>
              
              <div class="form-group">
                <label class="form-label" for="confirm-new-password">确认新密码 *</label>
                <input type="password" id="confirm-new-password" class="form-input" required placeholder="再次输入新密码">
              </div>
              
              <button type="submit" id="password-btn" class="btn btn-primary">
                修改密码
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Toast 通知容器 -->
  <div id="toast-container" class="toast-container"></div>

  <script src="/js/auth.js"></script>
  <script src="/js/pages.js"></script>
</body>
</html>
