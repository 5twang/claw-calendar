<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - Claw-Calendar</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-box">
      <div class="card">
        <div class="card-header" style="text-align: center;">
          <div style="margin-bottom: 16px;">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
          </div>
          <h1 class="card-title">欢迎回来</h1>
          <p class="card-subtitle">登录到 Claw-Calendar</p>
        </div>
        
        <div class="card-body">
          <div id="message" class="alert hidden"></div>
          
          <form id="login-form">
            <div class="form-group">
              <label class="form-label" for="email">邮箱地址</label>
              <input 
                type="email" 
                id="email" 
                class="form-input" 
                placeholder="your@email.com"
                required
                autocomplete="email"
              >
            </div>
            
            <div class="form-group">
              <label class="form-label" for="password">密码</label>
              <input 
                type="password" 
                id="password" 
                class="form-input" 
                placeholder="请输入密码"
                required
                autocomplete="current-password"
              >
            </div>
            
            <div class="form-group" style="display: flex; justify-content: space-between; align-items: center;">
              <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.9rem; color: var(--gray-600);">
                <input type="checkbox" id="remember" style="width: 16px; height: 16px;">
                记住我
              </label>
              <a href="/forgot-password.html" style="font-size: 0.9rem; color: var(--primary); text-decoration: none;">忘记密码？</a>
            </div>
            
            <button type="submit" id="submit-btn" class="btn btn-primary btn-block" style="margin-top: 8px;">
              登录
            </button>
          </form>
        </div>
      </div>
      
      <div class="auth-footer">
        还没有账户？<a href="/register.html">立即注册</a>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/auth-forms.js"></script>
</body>
</html>
