worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss;

    upstream app {
        server app:3000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name localhost claw-calendar claw-calendar.com;

        # HTTP 到 HTTPS 重定向 - 使用 claw-calendar.com 确保正确跳转
        return 301 https://claw-calendar.com$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name claw-calendar.com api.claw-calendar.com;

        ssl_certificate /etc/nginx/ssl/claw-calendar.com_bundle.pem;
        ssl_certificate_key /etc/nginx/ssl/claw-calendar.com.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        client_max_body_size 10M;

        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # CSP - 限制内联脚本和资源
        # 注意：生产环境应移除 'unsafe-inline' 和 'unsafe-eval'
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

        location / {
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # 确保 Authorization 头被正确传递
            proxy_set_header Authorization $http_authorization;
            proxy_cache_bypass $http_upgrade;
            
            # 超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            
            # CalDAV 需要较大的请求体
            client_max_body_size 10M;
        }

        # 静态文件
        location /public/ {
            alias /usr/share/nginx/html/public/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # 健康检查
        location /health {
            proxy_pass http://app;
            access_log off;
        }

        # .well-known 服务发现路径（RFC 6764）- nginx 直接重定向
        location ~ ^/\.well-known/caldav$ {
            return 301 https://claw-calendar.com/dav/;
        }

        # CalDAV 专用 location（必须在 location / 之后定义）
        location ~ ^/(dav|principals)/ {
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_cache_bypass $http_upgrade;
            
            # CORS 预检请求直接返回
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin '*';
                add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS, PROPFIND, REPORT, PROPPATCH';
                add_header Access-Control-Allow-Headers 'Content-Type, Authorization, Depth, DAV, If-None-Match, If-Match';
                add_header Access-Control-Max-Age 86400;
                add_header DAV '1, 3, calendar-access, calendar-proxy';
                add_header Allow 'OPTIONS, PROPFIND, REPORT, PROPPATCH, PUT, DELETE, GET';
                return 200;
            }
            
            # CalDAV 需要较大的超时时间
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            client_max_body_size 10M;
        }

        # 禁止访问其他隐藏路径
        location ~ /\. {
            deny all;
        }
    }
}
